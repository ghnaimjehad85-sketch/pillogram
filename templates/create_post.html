<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>Create Post - Pillogram</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}


body{

margin:0;

min-height:100vh;

background:linear-gradient(135deg,#111827,#2563eb);

display:flex;

justify-content:center;

align-items:center;

}



.container{

width:95%;

max-width:500px;

}



.card{

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

padding:30px;

border-radius:25px;

box-shadow:0 15px 35px rgba(0,0,0,.3);

color:white;

}



.title{

text-align:center;

font-size:28px;

margin-bottom:25px;

}



.input-box{

margin-bottom:20px;

}



label{

display:block;

margin-bottom:8px;

font-size:16px;

}



textarea{

width:100%;

height:120px;

border:0;

border-radius:18px;

padding:15px;

font-size:16px;

resize:none;

outline:none;

}



input[type="file"]{

width:100%;

background:white;

color:#333;

padding:12px;

border-radius:15px;

}



button{

width:100%;

padding:15px;

border:0;

border-radius:20px;

background:white;

color:#2563eb;

font-size:18px;

font-weight:bold;

cursor:pointer;

}



button:hover{

transform:scale(1.03);

}



.back{

display:block;

text-align:center;

margin-top:20px;

color:white;

text-decoration:none;

}



</style>

</head>


<body>


<div class="container">


<div class="card">


<div class="title">

➕ إنشاء منشور

</div>



<form method="POST" enctype="multipart/form-data">



<div class="input-box">


<label>
الصورة
</label>


<input 
type="file"
name="image"
>


</div>




<div class="input-box">


<label>
اكتب شيئاً...
</label>


<textarea 
name="caption"
placeholder="شارك أفكارك مع الناس..."
required></textarea>


</div>




<button>

نشر 🚀

</button>



</form>



<a class="back" href="/">

العودة للرئيسية

</a>



</div>


</div>



</body>

</html>
