<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pillogram | Register</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="register-page">

<div class="auth-box">

<div class="logo">
Pillogram
</div>

<p class="auth-subtitle">
أنشئ حسابك وابدأ رحلتك 🚀
</p>

<form method="POST">

<input
type="text"
name="username"
placeholder="اسم المستخدم"
required>

<input
type="email"
name="email"
placeholder="البريد الإلكتروني"
required>

<input
type="password"
name="password"
placeholder="كلمة المرور"
required>

<button type="submit">

إنشاء الحساب

</button>

</form>

<div class="bottom-link">

لديك حساب بالفعل؟

<a href="/login">

تسجيل الدخول

</a>

</div>

</div>

</body>

</html>
