<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>Pillogram Search</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}


body{
margin:0;
background:linear-gradient(135deg,#111827,#2563eb);
min-height:100vh;
}


.container{

width:95%;
max-width:600px;
margin:auto;
padding:25px 15px 90px;

}


.box{

background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);

border-radius:25px;

padding:20px;

}


h2{

color:white;
text-align:center;

}



form{

display:flex;
gap:10px;

}



input{

flex:1;

padding:13px;

border:0;

border-radius:20px;

outline:none;

font-size:16px;

}



button{

border:0;

background:#2563eb;

color:white;

padding:0 20px;

border-radius:20px;

}




.user{

background:white;

margin-top:15px;

padding:15px;

border-radius:20px;

display:flex;

justify-content:space-between;

align-items:center;

}



.info{

display:flex;

align-items:center;

gap:12px;

}



.avatar{

width:55px;

height:55px;

border-radius:50%;

background:#ddd;

object-fit:cover;

}



.name{

font-size:18px;

font-weight:bold;

}



.actions a{

display:block;

text-decoration:none;

margin:5px;

padding:8px 12px;

border-radius:15px;

text-align:center;

}



.profile{

background:#eee;

color:#111;

}



.follow{

background:#2563eb;

color:white;

}



.message{

background:#16a34a;

color:white;

}



.nav{

position:fixed;

bottom:0;

left:0;

right:0;

height:70px;

background:white;

display:flex;

justify-content:space-around;

align-items:center;

border-radius:25px 25px 0 0;

}


.nav a{

text-decoration:none;

color:#2563eb;

font-size:22px;

text-align:center;

}


.nav span{

display:block;

font-size:12px;

}


</style>

</head>


<body>


<div class="container">


<div class="box">


<h2>
🔍 البحث عن أشخاص
</h2>



<form method="POST">

<input 
type="text"
name="search"
placeholder="اكتب اسم المستخدم..."
>


<button>
بحث
</button>


</form>





{% for user in users %}



<div class="user">



<div class="info">


{% if user.profile_image %}

<img class="avatar" src="/static/profiles/{{user.profile_image}}">

{% else %}

<div class="avatar"></div>

{% endif %}



<div class="name">

{{user.username}}

</div>


</div>



<div class="actions">


<a class="profile" href="/user/{{user.id}}">
الحساب
</a>


<a class="follow" href="/follow/{{user.id}}">
متابعة
</a>


<a class="message" href="/messages/{{user.id}}">
مراسلة 💬
</a>



</div>




</div>



{% endfor %}



</div>

</div>





<div class="nav">


<a href="/">
🏠
<span>الرئيسية</span>
</a>



<a href="/search">
🔍
<span>بحث</span>
</a>



<a href="/create_post">
➕
<span>إنشاء</span>
</a>



<a href="/chat_list">
💬
<span>الرسائل</span>
</a>


</div>



</body>

</html>
