<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>Pillogram Messages</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{

margin:0;
height:100vh;
background:linear-gradient(135deg,#111827,#2563eb);

display:flex;
flex-direction:column;

}


/* العنوان */

.header{

height:70px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

color:white;

display:flex;

align-items:center;

justify-content:center;

font-size:22px;

font-weight:bold;

}



/* منطقة الرسائل */

.chat{

flex:1;

overflow-y:auto;

padding:20px;

display:flex;

flex-direction:column;

gap:15px;

}



/* الرسالة */

.message{

max-width:75%;

padding:12px 18px;

border-radius:20px;

font-size:16px;

}



.mine{

background:#2563eb;

color:white;

align-self:flex-start;

border-bottom-left-radius:5px;

}



.other{

background:white;

color:#222;

align-self:flex-end;

border-bottom-right-radius:5px;

}



/* الكتابة */

.send{

background:white;

padding:12px;

display:flex;

gap:10px;

}


.send input{

flex:1;

border:1px solid #ddd;

border-radius:25px;

padding:12px;

font-size:16px;

}



.send button{

border:0;

background:#2563eb;

color:white;

padding:0 25px;

border-radius:25px;

font-size:16px;

}



</style>

</head>


<body>



<div class="header">

💬 Pillogram Chat

</div>




<div class="chat">


{% for message in messages %}



{% if message.sender_id == session["user_id"] %}


<div class="message mine">

{{message.text}}

</div>



{% else %}


<div class="message other">

{{message.text}}

</div>



{% endif %}



{% endfor %}



</div>





<form class="send" method="POST">


<input 
type="text"
name="message"
placeholder="اكتب رسالة..."
required
>



<button>

إرسال

</button>


</form>



</body>

</html>
